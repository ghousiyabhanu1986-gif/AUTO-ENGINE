name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Bootstrap Gradle wrapper JAR
        working-directory: betting-engine
        run: |
          gradle wrapper --gradle-version 8.9 --distribution-type bin
        env:
          GRADLE_VERSION: "8.9"

      - name: Grant execute permission for gradlew
        run: chmod +x betting-engine/gradlew

      - name: Build Debug APK
        working-directory: betting-engine
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build Release APK
        working-directory: betting-engine
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BettingEngine-debug
          path: betting-engine/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: BettingEngine-release-unsigned
          path: betting-engine/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: error
